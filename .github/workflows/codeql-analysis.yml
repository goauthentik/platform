name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 20 * * 2"

permissions:
  actions: read
  checks: write
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze

    strategy:
      fail-fast: false
      matrix:
        language-platform:
          - language: "go"
            platform: ubuntu-24.04
          - language: "rust"
            platform: ubuntu-24.04
          - language: "javascript"
            platform: ubuntu-24.04
          # - language: "swift"
          #   platform: macos-26
          # - language: "cpp"
          #   platform: windows-2025
    runs-on: ${{ matrix.language-platform.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language-platform.language }}
      - name: Install libraries
        if: ${{ matrix.language-platform.language == 'ubuntu-24.04' }}
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev libudev-dev
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
