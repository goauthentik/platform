name: release-publish

on:
  release:
    types: [created, published]

jobs:
  call-build-go:
    uses: ./.github/workflows/_build-go.yml
    secrets: inherit
    with:
      is_release: true
  call-build-js:
    uses: ./.github/workflows/_build-js.yml
    secrets: inherit
    with:
      is_release: true
  call-build-rs:
    uses: ./.github/workflows/_build-rs.yml
    secrets: inherit
    with:
      is_release: true
  call-build-ee-wcp:
    uses: ./.github/workflows/_build-ee-wcp.yml
    secrets: inherit
    with:
      is_release: true
  call-build-ee-psso:
    uses: ./.github/workflows/_build-ee-psso.yml
    secrets: inherit
    with:
      is_release: true

  call-package-darwin:
    needs:
      - call-build-go
      - call-build-ee-psso
    uses: ./.github/workflows/_package-darwin.yml
    secrets: inherit
    with:
      is_release: true
  call-package-windows:
    needs:
      - call-build-go
      - call-build-ee-wcp
    uses: ./.github/workflows/_package-windows.yml
    secrets: inherit
    with:
      is_release: true

  call-deploy:
    needs:
      - call-build-go
      - call-build-js
      - call-build-rs
      - call-package-darwin
      - call-package-windows
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
    with:
      upload-repo-artifact: true

  deploy-to-netlify:
    needs: call-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Download repository
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v6
        with:
          name: repo
          path: ./deploy
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v6
        with:
          name: all-packages
          path: ./deploy/packages
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v2
        with:
          client-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIV_KEY }}
      - uses: nwtgck/actions-netlify@4cbaf4c08f1a7bfa537d6113472ef4424e4eb654 # v3.0
        with:
          publish-dir: "./deploy"
          production-deploy: true
          github-token: ${{ steps.app-token.outputs.token }}
          deploy-message: "Release: ${{ github.event.release.tag_name }}"
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: authentik-pkg.netlify.app

  attach-and-publish:
    name: Attach artifacts and publish
    needs: [call-deploy, call-package-darwin, call-package-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v2
        with:
          client-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIV_KEY }}
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v6
        with:
          name: all-packages
          path: ./packages
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          files: |
            ./packages/authentik_browser-ext/browser-ext/authentik_chrome.zip
            ./packages/authentik_browser-ext/browser-ext/authentik_firefox.zip
            ./packages/authentik_package-macos/authentik Agent Installer.pkg
            ./packages/authentik_package-windows/authentik Agent Installer.msi
