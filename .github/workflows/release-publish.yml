name: release-publish

on:
  release:
    types: [created, published]

jobs:
  call-build-go:
    uses: ./.github/workflows/_build-go.yml
    secrets: inherit
    with:
      is_release: true
  call-build-js:
    uses: ./.github/workflows/_build-js.yml
    secrets: inherit
    with:
      is_release: true
  call-build-rs:
    uses: ./.github/workflows/_build-rs.yml
    secrets: inherit
    with:
      is_release: true
  call-build-ee-wcp:
    uses: ./.github/workflows/_build-ee-wcp.yml
    secrets: inherit
    with:
      is_release: true
  call-build-ee-psso:
    uses: ./.github/workflows/_build-ee-psso.yml
    secrets: inherit
    with:
      is_release: true

  call-package-darwin:
    needs:
      - call-build-go
      - call-build-ee-psso
    uses: ./.github/workflows/_package-darwin.yml
    secrets: inherit
    with:
      is_release: true
  call-package-windows:
    needs:
      - call-build-go
      - call-build-ee-wcp
    uses: ./.github/workflows/_package-windows.yml
    secrets: inherit
    with:
      is_release: true

  call-deploy:
    needs:
      - call-build-go
      - call-build-js
      - call-build-rs
      - call-package-darwin
      - call-package-windows
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
    with:
      upload-repo-artifact: true

  deploy-to-netlify:
    needs: call-deploy
    runs-on: ubuntu-latest
    outputs:
      deploy-url: ${{ steps.netlify.outputs.deploy-url }}
    steps:
      - name: Download repository
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v6
        with:
          name: repo
          path: ./deploy
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v6
        with:
          name: all-packages
          path: ./deploy/packages
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v2
        with:
          client-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIV_KEY }}
      - uses: nwtgck/actions-netlify@d22a32a27c918fe470bbc562e984f80ec48c2668 # v4.0.0
        id: netlify
        with:
          publish-dir: "./deploy"
          production-deploy: true
          github-token: ${{ steps.app-token.outputs.token }}
          deploy-message: "Release: ${{ github.event.release.tag_name }}"
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: authentik-pkg.netlify.app

  build-container:
    needs: deploy-to-netlify
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - containers/selenium
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        env:
          AK_DEPLOY_URL: ${{ needs.deploy-to-netlify.outputs.deploy-url }}
        run: |
          cd ${{ matrix.target }}
          echo "tag<<EOF" >> $GITHUB_OUTPUT
          make ci-container-tag >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "build-args<<EOF" >> $GITHUB_OUTPUT
          make ci-build-args >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.target }}
          file: ${{ matrix.target }}/Dockerfile
          push: true
          build-args: ${{ steps.meta.outputs.build-args }}
          tags: ${{ steps.meta.outputs.tag }}
          platforms: linux/amd64,linux/arm64

  attach-and-publish:
    name: Attach artifacts and publish
    needs: [call-deploy, call-package-darwin, call-package-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v2
        with:
          client-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIV_KEY }}
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v6
        with:
          name: all-packages
          path: ./packages
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          files: |
            ./packages/authentik_browser-ext/browser-ext/authentik_chrome.zip
            ./packages/authentik_browser-ext/browser-ext/authentik_firefox.zip
            ./packages/authentik_package-macos/authentik Agent Installer.pkg
            ./packages/authentik_package-windows/authentik Agent Installer.msi
