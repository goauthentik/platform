name: _build-rust

on:
  workflow_call:
    inputs:
      is_release:
        type: boolean
        default: false
      rust_build_flags:
        type: string
        default: ""
      artifact_suffix:
        type: string
        default: ""
      platforms:
        type: string
        default: '["macos-26","ubuntu-24.04","ubuntu-24.04-arm","windows-2025"]'
    outputs:
      artifact:
        value: ${{ jobs.build.outputs.artifact-id }}

jobs:
  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        target:
          - ak-agent
          - ak-agent-desktop
          - ak-pam
          - ak-nss
          - ak-browser-support
          - ak-cli
        platform: ${{ fromJSON(inputs.platforms) }}
        exclude:
          # pam & nss are linux-only targets
          - target: ak-pam
            platform: macos-26
          - target: ak-pam
            platform: windows-2025
          - target: ak-nss
            platform: macos-26
          - target: ak-nss
            platform: windows-2025
    runs-on: ${{ matrix.platform }}
    env:
      CARGO_TERM_COLOR: always
    permissions:
      contents: read
    outputs:
      artifact-id: ${{ steps.artifact.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5
      - if: ${{ matrix.target == 'ak-agent-desktop' }}
        uses: pnpm/action-setup@v6
        with:
          run_install: false
      - if: ${{ matrix.target == 'ak-agent-desktop' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: "${{ matrix.target }}/package.json"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
      # ubuntu builds run inside the builder container image, which already
      # bakes in the pinned toolchain - only macos/windows need it installed
      # (and cached) on the runner itself.
      - if: ${{ !startsWith(matrix.platform, 'ubuntu') }}
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-toolchain-${{ matrix.platform }}-${{ hashFiles('rust-toolchain.toml') }}
      - if: ${{ !startsWith(matrix.platform, 'ubuntu') }}
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          rustflags: ""
          cache: false
      - if: ${{ !startsWith(matrix.platform, 'ubuntu') }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-toolchain-${{ matrix.platform }}-${{ hashFiles('rust-toolchain.toml') }}
      - uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cache/
          key: target-cache-${{ matrix.platform }}-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.target }}
          restore-keys: |
            target-cache-${{ matrix.platform }}-${{ hashFiles('**/Cargo.lock') }}-
            target-cache-${{ matrix.platform }}-
      - name: Build builder image
        if: startsWith(matrix.platform, 'ubuntu')
        run: make containers/builder/build
      - run: |
          make ${{ matrix.target }}/build
        env:
          RUST_BUILD_FLAGS: ${{ inputs.rust_build_flags }}
          AK_IS_RELEASE: ${{ inputs.is_release }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        id: artifact
        with:
          name: authentik_${{ matrix.platform }}_${{ matrix.target }}${{ inputs.artifact_suffix }}
          path: bin/
      - uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        if: always()
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cache/
          key: target-cache-${{ matrix.platform }}-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.target }}
