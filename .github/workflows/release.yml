name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.41.0)'
        required: true
        type: string

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v2
        with:
          client-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIV_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Bump version
        run: make bump version=${{ inputs.version }}

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: bump version to ${{ inputs.version }}"
          git tag v${{ inputs.version }}
          git push origin HEAD:main
          git push origin v${{ inputs.version }}

      - name: Create draft release
        run: |
          gh release create v${{ inputs.version }} \
            --draft \
            --generate-notes \
            --title "v${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
