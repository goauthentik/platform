# yaml-language-server: $schema=https://nfpm.goreleaser.com/static/schema.json
name: "authentik-agent"
arch: "${ARCH}"
platform: "linux"
version: "${VERSION_PKG}"
description: |
  authentik Agent
vendor: "Authentik Security Inc."
homepage: "https://goauthentik.io"
maintainer: "Authentik Security Inc."
license: "MIT"
contents:
  - src: ../../bin/agent/ak-agent
    dst: /usr/bin/ak-agent
  - src: ./agent/etc/systemd/user/ak-agent.service
    dst: /etc/systemd/user/ak-agent.service
  - src: ./agent/usr/share/polkit-1/actions/io.goauthentik.platform.policy
    dst: /usr/share/polkit-1/actions/io.goauthentik.platform.policy
overrides:
  deb:
    scripts:
      postinstall: ./agent/_deb/postinst.sh
  rpm:
    scripts:
      postinstall: ./agent/_rpm/post.sh
