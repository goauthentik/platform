[package]
name = "authentik_sys"
version = "0.42.0"
edition = "2024"

[lib]
crate-type = ["staticlib", "lib"]

[workspace.lints.clippy]
panic = "deny"
unwrap_used = "deny"
expect_used = "deny"

[lints]
workspace = true

[workspace]
resolver = "3"
members = ["nss", "pam"]

[[example]]
name = "grpc"

[[example]]
name = "log"

[dependencies]
base64 = "0.22.1"
cxx = "1.0.194"
hyper-util = "0.1.20"
libc = "0.2.186"
log = "0.4.29"
prost = "0.14"
prost-types = "0.14"
sentry = "0.48.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tokio = { version = "1.52.3", features = ["rt-multi-thread"] }
tonic = "0.14"
tonic-prost = "0.14"
tower = { version = "0.5.3", features = ["util" ]}
url = "2.5.8"
windows-sys = "0.61.2"

[target.'cfg(windows)'.dependencies]
eventlog = "0.4.0"
winreg = { version = "0.56", features = ["serialization-serde"] }
serde_derive = "1"

[target.'cfg(unix)'.dependencies]
syslog = "7.0.0"
