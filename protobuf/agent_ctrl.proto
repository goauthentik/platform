syntax = "proto3";

package agent_ctrl;
option go_package = "pkg/pb";
option swift_prefix = "";

import "agent.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service AgentCtrl {
  rpc ListProfiles(google.protobuf.Empty) returns (ListProfilesResponse);
  rpc Setup(SetupRequest) returns (SetupResponse);
}

message SetupRequest {
  agent.RequestHeader header = 1;
  string authentik_url = 2;
  string app_slug = 3;
  string client_id = 4;
  string access_token = 5;
  string refresh_token = 6;
}

message SetupResponse {
  agent.ResponseHeader header = 1;
}

message Profile {
  string name = 1;
  string username = 2;
  string authentik_url = 3;
  google.protobuf.Timestamp last_renewed = 4;
  google.protobuf.Timestamp next_renew = 5;
}

message ListProfilesResponse {
  agent.ResponseHeader header = 1;
  repeated Profile profiles = 2;
}
