[package]
name = "ak-cli"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "ak_cli"
path = "src/lib.rs"

[[bin]]
name = "ak"
path = "src/main.rs"

[[bin]]
name = "gen-man"
path = "src/bin/gen_man.rs"

[lints]
workspace = true

[dependencies]
akp-logger = { path = "../akp-logger" }
authentik_sys = { "path" = ".." }
clap = { version = "4.6.1", features = ["derive"] }
clap_mangen = "0.2"
log = { workspace = true }
proc-macro2 = "1.0.106"
ratatui = "0.30.1"
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tonic = { workspace = true }
pbjson-types = { workspace = true }
chrono = { workspace = true }
aws-sdk-sts = "1.106.0"
aws-types = "1.3.16"
